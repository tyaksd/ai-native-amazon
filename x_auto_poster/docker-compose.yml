version: '3.8'

services:
  x-auto-poster:
    build: .
    container_name: x-auto-poster
    restart: unless-stopped
    environment:
      - X_API_KEY=${X_API_KEY}
      - X_API_SECRET=${X_API_SECRET}
      - X_ACCESS_TOKEN=${X_ACCESS_TOKEN}
      - X_ACCESS_TOKEN_SECRET=${X_ACCESS_TOKEN_SECRET}
      - X_BEARER_TOKEN=${X_BEARER_TOKEN}
      - POST_INTERVAL_MINUTES=120
      - MAX_POSTS_PER_DAY=15
      - POST_START_HOUR=0
      - POST_END_HOUR=23
      - LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs
      - ./post_history_x.json:/app/post_history_x.json
    networks:
      - x-poster-network

networks:
  x-poster-network:
    driver: bridge
